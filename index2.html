<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Варіант 2</title>
  <style>
    .dark {
      background: black;
      color: white;
    }
  </style>
</head>
<body>

  <div id="text">Текст для зміни</div>

  <input type="color" id="textColor" />
  <input type="color" id="bgColor" />

  <input type="range" id="size" min="10" max="50" />
  <span id="sizeValue"></span>

  <button id="bold">B</button>
  <button id="italic">I</button>
  <button id="underline">U</button>

  <button id="toggle">Сховати/Показати</button>
  <button id="mode">Light/Dark</button>
  <button id="reset">Скинути</button>

  <script src="script.js"></script>
</body>
</html>
